<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-page">
        <div class="form">
            <form class="login-form">
            <div id="usernameDiv">
              <input id="usernameInput" type="text" autocomplete="off" placeholder="Username"/>
              <p></p>
            </div>
            
            <input id="passwordInput" type="password" autocomplete="off" placeholder="Password"/>
            <!-- <button id="registerButton">Registerr</button> -->
            <input type="button" value="Register" id="registerButton">
            <input type="button" value="Login" id="loginButton">
            <input type="button" value="Envoyer" id="sendButton">
          </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
